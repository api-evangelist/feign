aid: feign
name: Feign
description: >-
  Feign (OpenFeign) is a declarative Java HTTP client binder inspired by
  Retrofit, JAX-RS, and WebSocket. It turns annotated interfaces into
  templated HTTP requests with pluggable encoders, decoders, error handlers,
  and HTTP transports. The OpenFeign organization maintains a large set of
  modules covering serialization (Jackson, Gson, Moshi, FastJSON2, JAXB,
  SAX, SOAP), HTTP transports (OkHttp, Apache HttpClient, Java 11 client,
  Ribbon), JAX-RS contracts, resilience (Hystrix), logging (SLF4J), form
  encoding, GraphQL, and metrics.
